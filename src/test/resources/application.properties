spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9999/realms/test
keycloak.token-url=http://localhost:8001/realms/books-archive/protocol/openid-connect/token
keycloak.client-id=books-archive-client
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
api.prefix=/api/v0
s3.endpoint=${S3_ENDPOINT}
s3.access-key=fake-value
s3.secret-key=fake-value
s3.bucket=fake-value