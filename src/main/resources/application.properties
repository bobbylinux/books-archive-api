spring.application.name=books-archive
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:5432/books_archive
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8001/realms/books-archive
keycloak.token-url=http://localhost:8001/realms/books-archive/protocol/openid-connect/token
keycloak.client-id=books-archive-client
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
api.prefix=/api/v0